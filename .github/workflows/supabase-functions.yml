name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, ilhaan]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions in repo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

          mapfile -t FUNCTIONS < <(
            find supabase/functions -mindepth 1 -maxdepth 1 -type d \
              ! -name "_shared" \
              -exec test -f "{}/index.ts" ';' \
              -printf '%f\n' \
              | sort
          )

          if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
            echo "No deployable edge functions found."
            exit 1
          fi

          echo "Deploying ${#FUNCTIONS[@]} function(s): ${FUNCTIONS[*]}"
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying ${fn}..."
            supabase functions deploy "${fn}" --project-ref "${SUPABASE_PROJECT_REF}"
          done
