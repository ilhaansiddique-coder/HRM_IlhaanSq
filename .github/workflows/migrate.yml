name: 🗄️ DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show diff, dont apply)'
        type: boolean
        default: true

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Show migration diff (dry run)
        if: ${{ inputs.dry_run == true || github.event_name == 'workflow_dispatch' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "📋 Pending migrations:"
          supabase db diff --linked --schema public 2>/dev/null || echo "No diff available"
          supabase migration list

      - name: Apply migrations
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "🚀 Applying migrations..."
          supabase db push
          echo "✅ Migrations applied"

      - name: Run RLS test suite after migration
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_URL:              ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_TENANT_A_ID:          ${{ secrets.TEST_TENANT_A_ID }}
          TEST_TENANT_B_ID:          ${{ secrets.TEST_TENANT_B_ID }}
        run: |
          npm ci --prefer-offline --quiet
          node scripts/test-rls.js
