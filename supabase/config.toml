project_id = "alhntgyjagjiobqzflqc"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.template.confirmation]
subject = '{{ if eq .Data.source "tenant_request" }}Verify your email to continue your tenant request{{ else if eq .Data.source "tenant_request_alert" }}New tenant request requires review{{ else if eq .Data.source "tenant_access_approved" }}Your tenant access is approved{{ else if eq .Data.source "tenant_created_by_superadmin" }}Your tenant access is approved{{ else if eq .Data.source "tenant_created_alert" }}A tenant was created by super admin{{ else if eq .Data.source "tenant_welcome" }}Welcome to {{ if .Data.workspace_name }}{{ .Data.workspace_name }}{{ else }}your workspace{{ end }}{{ else }}Your secure sign-in link{{ end }}'
content_path = "./supabase/templates/auth-email.html"

[auth.email.template.magic_link]
subject = '{{ if eq .Data.source "tenant_request" }}Verify your email to continue your tenant request{{ else if eq .Data.source "tenant_request_alert" }}New tenant request requires review{{ else if eq .Data.source "tenant_access_approved" }}Your tenant access is approved{{ else if eq .Data.source "tenant_created_by_superadmin" }}Your tenant access is approved{{ else if eq .Data.source "tenant_created_alert" }}A tenant was created by super admin{{ else if eq .Data.source "tenant_welcome" }}Welcome to {{ if .Data.workspace_name }}{{ .Data.workspace_name }}{{ else }}your workspace{{ end }}{{ else }}Your secure sign-in link{{ end }}'
content_path = "./supabase/templates/auth-email.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

