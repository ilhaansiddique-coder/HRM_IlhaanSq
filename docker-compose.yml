services:
  postgres:
    image: postgres:16-alpine
    container_name: hrmilhaansq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrmilhaansq
      POSTGRES_PASSWORD: hrmilhaansq_dev
      POSTGRES_DB: hrmilhaansq
    ports:
      # Host port 5433 → container port 5432 (avoids conflict with other Postgres instances)
      - "5434:5432"
    volumes:
      - hrmilhaansq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrmilhaansq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrmilhaansq_redis
    restart: unless-stopped
    ports:
      # Host port 6380 → container port 6379 (avoids conflict with sst-redis)
      - "6381:6379"
    volumes:
      - hrmilhaansq_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  hrmilhaansq_pg_data:
  hrmilhaansq_redis_data:
